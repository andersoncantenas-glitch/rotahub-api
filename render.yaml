services:
  - type: web
    name: rotahub-api
    runtime: python
    plan: free
    buildCommand: "python -m pip install --upgrade pip setuptools wheel && pip install -r backend/requirements.txt"
    startCommand: "python scripts/render_start.py"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ROTA_SECRET
        sync: false
      - key: ROTA_ENABLE_LEGACY_MOBILE_API
        value: "1"
      - key: ROTA_ENFORCE_PLAN_FEATURES
        value: "1"
      - key: ROTA_ENFORCE_BILLING
        value: "1"
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: rotahub-api.onrender.com
      - key: CORS_ORIGINS
        value: https://rotahub-api.onrender.com
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////tmp/rotahub/rotadb.db
      - key: ROTA_DB
        value: /tmp/rotahub/rotadb.db
      - key: ROTA_MOBILE_PHOTOS_DIR
        value: /tmp/rotahub/fotos_rotas
